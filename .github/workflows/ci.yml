name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests (ros:jazzy)
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy
    steps:
      - uses: actions/checkout@v4

      - name: Install Python test dependencies
        run: |
          apt-get update -q
          apt-get install -y -q python3-pip python3-numpy
          python3 -m pip install --break-system-packages -e ".[test]"
          python3 -m pip install --break-system-packages \
            colcon-python-setup-py colcon-bash colcon-recursive-crawl

      - name: Run tests
        run: |
          . /opt/ros/jazzy/setup.sh
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 colcon_systemd/ tests/ --max-line-length=100 --count --show-source --statistics
