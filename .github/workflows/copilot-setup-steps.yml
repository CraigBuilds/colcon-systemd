name: "Copilot Setup Steps"

on: workflow_dispatch

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    #container:
      #image: ros:jazzy
    steps:
      - uses: actions/checkout@v4

      - name: Install colcon-systemd dependencies
        run: |
          apt-get update -q
          apt-get install -y -q python3-pip python3-numpy
          python3 -m pip install --break-system-packages -e ".[test]"
          python3 -m pip install --break-system-packages \
            colcon-python-setup-py colcon-bash colcon-recursive-crawl