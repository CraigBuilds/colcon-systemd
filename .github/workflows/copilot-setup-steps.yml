name: "Copilot Setup Steps"

on: workflow_dispatch

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install ROS 2 Jazzy
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q curl software-properties-common
          sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
            -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] \
            http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo $UBUNTU_CODENAME) main" \
            | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
          sudo apt-get update -q
          sudo apt-get install -y -q ros-jazzy-ros-base

      - name: Install colcon-systemd dependencies
        run: |
          python3 -m pip install --break-system-packages -e ".[test]" \
            colcon-python-setup-py colcon-bash colcon-recursive-crawl