name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    name: Tests (ros:jazzy)
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy
    steps:
      - uses: actions/checkout@v4

      - name: Install Python test dependencies
        run: |
          apt-get update -q
          apt-get install -y -q python3-pip python3-numpy
          python3 -m pip install --break-system-packages -e ".[test]"
          python3 -m pip install --break-system-packages \
            colcon-python-setup-py colcon-bash colcon-recursive-crawl

      - name: Run tests
        run: |
          . /opt/ros/jazzy/setup.sh
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 colcon_systemd/ tests/ --max-line-length=100 --count --show-source --statistics

  publish:
    needs: [test, lint]
    runs-on: ubuntu-latest
    # The 'pypi' environment must be configured in the repository settings with
    # a PyPI trusted publisher pointing to this workflow file (release.yml) and
    # the PyPI project 'colcon-systemd'. No API token secrets are required;
    # authentication is handled via OIDC.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distribution packages
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
