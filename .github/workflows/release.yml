name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (ros:jazzy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ROS 2 Jazzy
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q curl software-properties-common
          sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
            -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) \
            signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] \
            http://packages.ros.org/ros2/ubuntu \
            $(. /etc/os-release && echo $UBUNTU_CODENAME) main" \
            | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
          sudo apt-get update -q
          sudo apt-get install -y -q ros-jazzy-ros-base python3-pip python3-numpy

      - name: Install Python test dependencies
        run: |
          python3 -m pip install --break-system-packages -e ".[test]"
          python3 -m pip install --break-system-packages \
            colcon-python-setup-py colcon-bash colcon-recursive-crawl colcon-ros

      - name: Run tests
        run: |
          . /opt/ros/jazzy/setup.sh
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 colcon_systemd/ tests/ --max-line-length=100 --count --show-source --statistics

  publish:
    needs: [test, lint]
    runs-on: ubuntu-latest
    # The 'pypi' environment must be configured in the repository settings with
    # a PyPI trusted publisher pointing to this workflow file (release.yml) and
    # the PyPI project 'colcon-systemd'. No API token secrets are required;
    # authentication is handled via OIDC.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distribution packages
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
