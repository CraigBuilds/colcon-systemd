name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          # colcon-python-setup-py, colcon-bash, and colcon-recursive-crawl are
          # required by the end-to-end tests that run a real colcon build.
          pip install colcon-python-setup-py colcon-bash colcon-recursive-crawl

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 colcon_systemd/ tests/ --max-line-length=100 --count --show-source --statistics

  publish:
    needs: [test, lint]
    runs-on: ubuntu-latest
    # The 'pypi' environment must be configured in the repository settings with
    # a PyPI trusted publisher pointing to this workflow file (release.yml) and
    # the PyPI project 'colcon-systemd'. No API token secrets are required;
    # authentication is handled via OIDC.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distribution packages
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
